<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Umbral</title>
    <link rel="stylesheet" href="blocked.css">
  </head>
  <body class="is-loading">
    <main>
      <section class="breathing" aria-label="Guía de respiración">
        <div id="breath-mark" class="breath-mark" aria-hidden="true">
          <svg viewBox="0 0 512 512">
            <path class="threshold-door" d="M156 378V134h200v244"></path>
            <path class="threshold-line" d="M112 378h288"></path>
            <circle class="threshold-core" cx="256" cy="338" r="68"></circle>
          </svg>
        </div>
        <p id="breath-label" class="breath-label" aria-live="polite">Inhalá</p>
        <p id="breath-timer" class="breath-timer">30 segundos</p>
      </section>

      <section class="thought" aria-label="Pensamiento">
        <blockquote id="reflection"></blockquote>
        <cite id="reflection-source"></cite>
      </section>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
